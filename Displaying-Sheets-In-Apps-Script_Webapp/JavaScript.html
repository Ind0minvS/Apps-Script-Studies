<script>
  /** Promise wrapper around google.script.run (callback-based by default). */
  function call(fn) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function (resolve, reject) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)[fn].apply(null, args);
    });
  }

  var tabsEl    = document.getElementById('tabs');
  var titleEl   = document.getElementById('sheet-title');
  var dataEl    = document.getElementById('data');

  /** Escape text so cell values can't inject HTML. */
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /** Load the list of sheets and build the left-side tabs. */
  function loadTabs() {
    call('getSheetNames').then(function (names) {
      tabsEl.innerHTML = '';
      if (!names.length) {
        tabsEl.innerHTML = '<li class="loading">Nenhuma aba encontrada</li>';
        return;
      }
      names.forEach(function (name, i) {
        var li = document.createElement('li');
        li.textContent = name;
        li.setAttribute('data-name', name);
        li.addEventListener('click', function () { selectTab(name, li); });
        tabsEl.appendChild(li);
        if (i === 0) selectTab(name, li); // auto-open the first sheet
      });
    }).catch(function (err) {
      tabsEl.innerHTML = '';
      dataEl.innerHTML = '<div class="error">Erro ao carregar abas: ' +
        esc(err.message || err) + '</div>';
    });
  }

  /** Mark a tab active and load its data. */
  function selectTab(name, li) {
    var all = tabsEl.querySelectorAll('li');
    for (var k = 0; k < all.length; k++) all[k].classList.remove('active');
    if (li) li.classList.add('active');

    titleEl.textContent = name;
    dataEl.innerHTML = '<p class="spinner">Carregando dados…</p>';

    call('getSheetData', name).then(function (res) {
      renderTable(res);
    }).catch(function (err) {
      dataEl.innerHTML = '<div class="error">Erro ao carregar dados: ' +
        esc(err.message || err) + '</div>';
    });
  }

  /** Render {rows, merges, numCols} as an HTML table, reproducing merges. */
  function renderTable(res) {
    if (!res || !res.rows.length) {
      dataEl.innerHTML = '<p class="muted">Esta aba não possui dados preenchidos.</p>';
      return;
    }

    var rows = res.rows;
    var numCols = res.numCols;

    // Build lookup maps from the sheet's merged ranges:
    //  - anchor[r][c]  = {colspan, rowspan} for the top-left cell of a merge
    //  - covered[r][c] = true for the other cells of a merge (skip them)
    var anchor = {};
    var covered = {};
    (res.merges || []).forEach(function (m) {
      anchor[m.row + ':' + m.col] = { colspan: m.numCols, rowspan: m.numRows };
      for (var dr = 0; dr < m.numRows; dr++) {
        for (var dc = 0; dc < m.numCols; dc++) {
          if (dr === 0 && dc === 0) continue;
          covered[(m.row + dr) + ':' + (m.col + dc)] = true;
        }
      }
    });

    function isBlank(r) {
      return rows[r].every(function (v) { return String(v == null ? '' : v).trim() === ''; });
    }

    var html = '<table><tbody>';

    for (var r = 0; r < rows.length; r++) {
      if (isBlank(r)) continue; // drop fully-empty rows

      html += '<tr>';

      // A non-merged row that has a single value -> span & center it,
      // so values aren't followed by stray empty cells.
      var nonEmpty = [];
      for (var k = 0; k < numCols; k++) {
        if (String(rows[r][k] == null ? '' : rows[r][k]).trim() !== '') nonEmpty.push(k);
      }
      var hasMergeOnRow = false;
      for (var k2 = 0; k2 < numCols; k2++) {
        if (anchor[r + ':' + k2] || covered[r + ':' + k2]) { hasMergeOnRow = true; break; }
      }
      var spanWholeRow = !hasMergeOnRow && nonEmpty.length === 1;

      if (spanWholeRow) {
        var val = rows[r][nonEmpty[0]];
        html += '<td colspan="' + numCols + '" class="merged">' + esc(val) + '</td></tr>';
        continue;
      }

      for (var c = 0; c < numCols; c++) {
        var key = r + ':' + c;
        if (covered[key]) continue; // part of a merge, already spanned

        var attrs = '';
        var cls = '';
        var a = anchor[key];
        if (a) {
          if (a.colspan > 1) attrs += ' colspan="' + a.colspan + '"';
          if (a.rowspan > 1) attrs += ' rowspan="' + a.rowspan + '"';
          cls = ' class="merged"'; // merged cells are centered
        }
        html += '<td' + attrs + cls + '>' + esc(rows[r][c] == null ? '' : rows[r][c]) + '</td>';
      }
      html += '</tr>';
    }

    html += '</tbody></table>';
    dataEl.innerHTML = html;
  }

  loadTabs();
</script>
